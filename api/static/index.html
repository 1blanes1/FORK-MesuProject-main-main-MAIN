{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ячейки с иконками и формами</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet">
    <link rel="stylesheet" href="{% static 'styles/main.css' %}">
</head>
<body>
    <!-- Изменил ID контейнера в соответствии с готовой версткой -->
    <section class="news">
        <div class="news-container" id="news-container">
            <h2>Новости</h2>
            <!-- Контейнер для новостей -->
            <div class="news-wrapper" id="news-wrapper"></div>
            
            <!-- Кнопка "Все новости" (остается статичной) -->
            <a href="#news" class="page-button">
                <img src="{% static 'img/main-page/news_button.png' %}" class="all-news" alt="Все новости">
            </a>
        </div>
    </section>

    <script>
        function addNewsCard(title, img_path, url) {
            // Находим контейнер для новостей
            const newsWrapper = document.getElementById('news-wrapper');
            if (!newsWrapper) {
                console.error('Контейнер .news-wrapper не найден!');
                return;
            }

            // Создаем элемент новости с классом news-item
            const newsItem = document.createElement('div');
            newsItem.className = 'news-item';

            // Создаем ссылку
            const link = document.createElement('a');
            link.href = url || '#';

            // Создаем изображение с классом news-img
            const img = document.createElement('img');
            img.className = 'news-img';
            img.src = img_path;
            img.alt = title || 'Изображение новости';

            // Создаем заголовок
            const titleEl = document.createElement('h3');
            titleEl.textContent = title || 'Без заголовка';

            // Собираем структуру
            link.appendChild(img);
            link.appendChild(titleEl);
            newsItem.appendChild(link);
            newsWrapper.appendChild(newsItem);
        }

        async function loadNews() {
            try {
                const res = await fetch('/news');
                if (!res.ok) {
                    throw new Error(`Ошибка загрузки: ${res.status}`);
                }
                
                const arr = await res.json();
                console.log(`Загружено ${arr.length} новостей`);

                // Очищаем контейнер перед добавлением новых новостей
                const newsWrapper = document.getElementById('news-wrapper');
                if (newsWrapper) {
                    newsWrapper.innerHTML = '';
                }

                // Добавляем каждую новость
                for (let i = 0; i < arr.length; i++) {
                    addNewsCard(
                        arr[i].title, 
                        arr[i].img_path, 
                        arr[i].url
                    );
                }
                
            } catch (error) {
                console.error('Ошибка при загрузке новостей:', error);
                // Можно показать сообщение об ошибке пользователю
                const newsWrapper = document.getElementById('news-wrapper');
                if (newsWrapper) {
                    newsWrapper.innerHTML = '<p>Не удалось загрузить новости. Попробуйте позже.</p>';
                }
            }
        }

        // Загружаем новости при загрузке страницы
        document.addEventListener('DOMContentLoaded', loadNews);
    </script>
</body>
</html>
