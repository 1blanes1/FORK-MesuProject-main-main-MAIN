    <script>
        function addNewsCard(title, description, img_path, url) {

            card.appendChild(descEl);

                        arr[i].desc,
                        arr[i].img_path,
                        arr[i].url // ← предполагается, что у объекта есть поле url
                    );
                }
            } catch (err) {
                console.error('Не удалось загрузить новости:', err);
            }
