<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Команда</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 30px auto;
      padding: 20px;
      background: #f9f9f9;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
    }
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }
    .member-card {
      background: white;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
    }
    .member-card img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 12px;
    }
    .member-card h3 {
      margin: 8px 0 4px;
      font-size: 1.1em;
    }
    .member-card p.role, .member-card p.status {
      margin: 4px 0;
      font-size: 0.9em;
      color: #555;
    }
    .member-card a {
      display: inline-block;
      margin-top: 8px;
      color: #1a0dab;
      text-decoration: none;
      font-size: 0.9em;
    }
    .member-card a:hover {
      text-decoration: underline;
    }
    .loading {
      text-align: center;
      font-style: italic;
      color: #777;
    }
    .error {
      color: #c00;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

  <h1>Наша команда</h1>
  <div id="team-container">
    <div class="loading">Загрузка...</div>
  </div>

  <script>
    async function loadTeam() {
      const container = document.getElementById('team-container');

      try {
        const response = await fetch('/team_page/get');
        if (!response.ok) throw new Error('Не удалось загрузить данные');

        const members = await response.json();

        if (!Array.isArray(members)) {
          throw new Error('Неверный формат данных: ожидается массив');
        }

        if (members.length === 0) {
          container.innerHTML = '<p style="text-align:center;">Команда пока пуста.</p>';
          return;
        }

        let html = '<div class="team-grid">';
        for (const m of members) {
          const imgSrc = m.img_path
            ? (m.img_path.startsWith('http') ? m.img_path : window.location.origin + m.img_path)
            : '';

          html += `
            <div class="member-card">
              ${imgSrc ? `<img src="${imgSrc}" alt="${m.title || 'Участник'}">` : ''}
              <h3>${m.title || '—'}</h3>
              <p class="status">${m.status || ''}</p>
              <p class="role">${m.role || ''}</p>
              ${m.url ? `<a href="${m.url}" target="_blank">Профиль</a>` : ''}
            </div>
          `;
        }
        html += '</div>';
        container.innerHTML = html;
      } catch (err) {
        console.error('Ошибка загрузки команды:', err);
        container.innerHTML = `<div class="error">Ошибка: ${err.message}</div>`;
      }
    }

    document.addEventListener('DOMContentLoaded', loadTeam);
  </script>
</body>
</html>
