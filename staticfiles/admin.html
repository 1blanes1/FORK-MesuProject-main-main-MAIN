<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Отправка текста и картинки</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 30px auto;
      padding: 20px;
    }
    .hidden { display: none; }
    .form-section {
      margin-bottom: 40px;
      padding: 20px;
      border: 1px solid #eee;
      border-radius: 8px;
      background: #fafafa;
    }
    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      box-sizing: border-box;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover { background: #45a049; }
    .preview {
      max-width: 200px;
      margin: 10px 0;
    }
    .status {
      margin-top: 15px;
      padding: 12px;
      border-radius: 4px;
    }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    h2 {
      margin-top: 0;
    }
  </style>
</head>
<body>

  <!-- Авторизация -->
  <div id="auth-section">
    <h2>Авторизация</h2>
    <input type="text" id="username" placeholder="Логин" required>
    <input type="password" id="password" placeholder="Пароль" required>
    <button onclick="login()">Войти</button>
  </div>

  <!-- Основной контейнер с двумя колонками -->
  <div id="main-container" class="hidden">
    <div style="display: flex; gap: 30px; flex-wrap: wrap;">
      <!-- Колонка: формы добавления -->
      <div style="flex: 1; min-width: 300px;">
        <h2>Добавить</h2>

        <!-- Новости -->
        <div class="form-section">
          <h3>Новость</h3>
          <input type="text" id="title-news" placeholder="Заголовок">
          <textarea id="description-news" placeholder="Описание" rows="3"></textarea>
          <input type="url" id="url-news" placeholder="Ссылка (необязательно)">
          <input type="file" id="image-news" accept="image/*" onchange="previewImage(event, 'image-preview-news')">
          <img id="image-preview-news" class="preview hidden" alt="Предпросмотр">
          <button onclick="submitData('news')">Отправить</button>
          <div id="status-news" class="hidden"></div>
        </div>

        <!-- Историческая линия -->
        <div class="form-section">
          <h3>Историческая линия</h3>
          <input type="text" id="title-history_line" placeholder="Заголовок">
          <textarea id="description-history_line" placeholder="Описание" rows="3"></textarea>
          <input type="url" id="url-history_line" placeholder="Ссылка (необязательно)">
          <input type="file" id="image-history_line" accept="image/*" onchange="previewImage(event, 'image-preview-history_line')">
          <img id="image-preview-history_line" class="preview hidden" alt="Предпросмотр">
          <button onclick="submitData('history_line')">Отправить</button>
          <div id="status-history_line" class="hidden"></div>
        </div>

        <!-- Партнёры -->
        <div class="form-section">
          <h3>Партнёр</h3>
          <input type="text" id="title-partners" placeholder="Название партнёра">
          <input type="url" id="url-partners" placeholder="Ссылка на партнёра">
          <input type="file" id="image-partners" accept="image/*" onchange="previewImage(event, 'image-preview-partners')">
          <img id="image-preview-partners" class="preview hidden" alt="Предпросмотр">
          <button onclick="submitData('partners')">Отправить</button>
          <div id="status-partners" class="hidden"></div>
        </div>

        <!-- Участник команды -->
        <div class="form-section">
          <h3>Участник команды</h3>
          <input type="text" id="title-team_member" placeholder="Имя / ФИО">
          <input type="text" id="status-team_member" placeholder="Статус">
          <input type="text" id="role-team_member" placeholder="Роль в команде">
          <input type="url" id="url-team_member" placeholder="Ссылка на профиль (необязательно)">
          <input type="file" id="image-team_member" accept="image/*" onchange="previewImage(event, 'image-preview-team_member')">
          <img id="image-preview-team_member" class="preview hidden" alt="Предпросмотр">
          <button onclick="submitData('team_member')">Отправить</button>
          <div id="status-team_member" class="hidden"></div>
        </div>
      </div>

      <!-- Колонка: управление существующими записями -->
      <div style="flex: 1; min-width: 300px;">
        <h2>Управление записями</h2>

        <!-- Новости -->
        <div class="form-section">
          <h3>Новости</h3>
          <div id="list-news">Загрузка...</div>
        </div>

        <!-- Исторические линии -->
        <div class="form-section">
          <h3>Исторические линии</h3>
          <div id="list-history_line">Загрузка...</div>
        </div>

        <!-- Партнёры -->
        <div class="form-section">
          <h3>Партнёры</h3>
          <div id="list-partners">Загрузка...</div>
        </div>

        <!-- Команда -->
        <div class="form-section">
          <h3>Команда</h3>
          <div id="list-team_member">Загрузка...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // === Вспомогательные функции ===
    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

    function showStatusEl(el, text, type) {
      if (el) {
        el.textContent = text;
        el.className = `status ${type}`;
        el.classList.remove('hidden');
      }
    }

    function showStatus(formNum, text, type) {
      const el = document.getElementById(`status-${formNum}`);
      showStatusEl(el, text, type);
    }

    // === Авторизация ===
    async function login() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      if (!user || !pass) {
        alert('Введите логин и пароль');
        return;
      }

      const response = await fetch('/api/login/', {
        method: 'POST',
        headers: { "X-CSRFToken": getCookie('csrftoken') },
        body: new URLSearchParams({ username: user, password: pass })
      });

      if (response.ok) {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('main-container').classList.remove('hidden');
        loadAllLists();
        localStorage.setItem('user', user);
      } else {
        const data = await response.json();
        alert('Ошибка: ' + (data.error || 'Неизвестная ошибка'));
      }
    }

    // === Загрузка всех списков ===
    async function loadAllLists() {
      await Promise.all([
        loadList('news', '/news'),
        loadList('history_line', '/history_page/get'),
        loadList('partners', '/partners'),
        loadList('team_member', '/team_page/get')
      ]);
    }

    async function loadList(type, url) {
      const container = document.getElementById(`list-${type}`);
      container.innerHTML = 'Загрузка...';

      try {
        const response = await fetch(url, {
          headers: { "X-CSRFToken": getCookie('csrftoken') }
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();

        if (!Array.isArray(data)) {
          container.innerHTML = '<div class="error">Неверный формат данных</div>';
          return;
        }

        if (data.length === 0) {
          container.innerHTML = '<em>Нет записей</em>';
          return;
        }

        container.innerHTML = '';
        data.forEach(item => {
          const div = document.createElement('div');
          div.style.borderBottom = '1px solid #eee';
          div.style.padding = '8px 0';

          const title = item.title || item.name || 'Без названия';
          const img = item.image ? `<img src="${item.image}" style="max-height:40px; margin-right:10px; vertical-align:middle;">` : '';

          const deleteBtn = document.createElement('button');
          deleteBtn.textContent = 'Удалить';
          deleteBtn.style.background = '#e74c3c';
          deleteBtn.style.color = 'white';
          deleteBtn.style.border = 'none';
          deleteBtn.style.marginLeft = '10px';
          deleteBtn.style.padding = '4px 8px';
          deleteBtn.style.fontSize = '0.9em';
          deleteBtn.onclick = () => deleteItem(type, item.title, div);

          div.innerHTML = `${img}${title}`;
          div.appendChild(deleteBtn);
          container.appendChild(div);
        });
      } catch (err) {
        console.error('Ошибка загрузки', type, err);
        container.innerHTML = '<div class="error">Ошибка загрузки</div>';
      }
    }

    // === Удаление записи ===
    async function deleteItem(type, title, element) {
      if (!confirm(`Удалить запись "${title}"?`)) return;

      let apiUrl;
      switch (type) {
        case 'news': apiUrl = 'api/delete/news'; break;
        case 'history_line': apiUrl = 'api/delete/history_line'; break;
        case 'partners': apiUrl = 'api/delete/partner'; break;
        case 'team_member': apiUrl = 'api/delete/team_member'; break;
        default: return;
      }

      try {
        const response = await fetch(apiUrl, {
          method: 'DELETE',
          headers: {
            "X-CSRFToken": getCookie('csrftoken'),
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ title: title })
        });

        if (response.ok) {
          element.remove();
        } else {
          const err = await response.json().catch(() => ({}));
          alert('Ошибка удаления: ' + (err.error || 'Сервер не принял запрос'));
        }
      } catch (err) {
        console.error('Ошибка удаления:', err);
        alert('Не удалось удалить запись');
      }
    }

    // === Отправка новых записей ===
    async function submitData(formNum) {
      const title = document.getElementById(`title-${formNum}`)?.value?.trim() || '';
      const desc = document.getElementById(`description-${formNum}`)?.value?.trim() || '';
      const status = document.getElementById(`status-${formNum}`)?.value?.trim() || '';
      const role = document.getElementById(`role-${formNum}`)?.value?.trim() || '';
      const url = document.getElementById(`url-${formNum}`)?.value?.trim() || '';
      const fileInput = document.getElementById(`image-${formNum}`);
      const file = fileInput?.files[0];

      if (!title && !desc && !status && !role && !url && !file) {
        showStatus(formNum, 'Нет данных для отправки', 'error');
        return;
      }

      const formData = new FormData();
      if (title) formData.append('title', title);
      if (desc) formData.append('desc', desc);
      if (status) formData.append('status', status);
      if (role) formData.append('role', role);
      if (url) formData.append('url', url);
      if (file) formData.append('image', file);

      try {
        showStatus(formNum, 'Отправка...', 'success');

        const response = await fetch(`/api/post_${formNum}`, {
          method: 'POST',
          headers: { "X-CSRFToken": getCookie('csrftoken') },
          body: formData
        });

        const result = await response.json();

        if (response.ok) {
          showStatus(formNum, 'Успешно отправлено!', 'success');
          // Обновляем список
          await loadList(formNum, getApiUrlForType(formNum));
          // Очистка формы
          [...document.querySelectorAll(`#${formNum}-form input, #${formNum}-form textarea`)].forEach(el => el.value = '');
          const fileInput = document.getElementById(`image-${formNum}`);
          if (fileInput) fileInput.value = '';
          const preview = document.getElementById(`image-preview-${formNum}`);
          if (preview) preview.classList.add('hidden');
        } else {
          showStatus(formNum, `Ошибка: ${result.error || response.statusText}`, 'error');
        }
      } catch (err) {
        console.error('Ошибка:', err);
        showStatus(formNum, 'Не удалось отправить данные', 'error');
      }
    }

    function getApiUrlForType(type) {
      switch (type) {
        case 'news': return '/news';
        case 'history_line': return '/history_page/get';
        case 'partners': return '/partners';
        case 'team_member': return '/team_page/get';
        default: return '';
      }
    }

    // === Предпросмотр изображения ===
    function previewImage(event, previewId) {
      const preview = document.getElementById(previewId);
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => {
          preview.src = e.target.result;
          preview.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      } else {
        preview.classList.add('hidden');
      }
    }

    // === Автовход, если уже авторизован ===
    if (localStorage.getItem('user')) {
      document.getElementById('auth-section').classList.add('hidden');
      document.getElementById('main-container').classList.remove('hidden');
      loadAllLists();
    }
  </script>
</body>
